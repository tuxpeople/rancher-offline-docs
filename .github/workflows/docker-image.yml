name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [created]

env:
  REGISTRY: ghcr.io

jobs:

  # ---------------------------------------------------------------
  # Discover: findet alle Ordner mit Dockerfile und baut die Matrix
  # Läuft parallel zu lint — build wartet auf beide.
  # ---------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.find.outputs.images }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Find Dockerfiles
        id: find
        run: |
          images=$(find . -mindepth 2 -name Dockerfile \
            | xargs -I{} dirname {} \
            | xargs -I{} basename {} \
            | sort \
            | jq -R -s -c 'split("\n")[:-1]')
          echo "images=$images" >> $GITHUB_OUTPUT
          echo "Found: $images"

  # ---------------------------------------------------------------
  # Lint: alle Dockerfiles mit hadolint prüfen
  # Läuft parallel zu discover — build wartet auf beide.
  # Konfiguration: .hadolint.yaml
  # ---------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Lint all Dockerfiles
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          recursive: true
          config: .hadolint.yaml

  # ---------------------------------------------------------------
  # Build: paralleler Job pro Image
  #   - Image-Tag = HEAD SHA des upstream Docs-Repos
  #   - GHA Layer Cache
  #   - Push zu GHCR (ausser bei PRs)
  #   - SBOM als OCI-Attestation via BuildKit (ausser bei PRs)
  #   - Digest für SLSA + upstream SHA für Chart-Update speichern
  #   - Optional: stable version image (wenn upstream versions.json hat)
  # ---------------------------------------------------------------
  build:
    needs: [discover, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR push
      id-token: write   # SBOM- und Provenance-Attestationen
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
      fail-fast: false   # Andere Images weiterbauen wenn eines fehlschlägt

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # @ und Sonderzeichen entfernen (z.B. ansible@docker → ansible-docker)
      - name: Sanitize image name
        id: sanitize
        run: |
          safe=$(echo "${{ matrix.image }}" | tr '@' '-' | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          echo "safe_name=$safe" >> $GITHUB_OUTPUT

      # HEAD SHA und URL des upstream Docs-Repos aus dem Dockerfile auslesen.
      # SHA wird als Image-Tag verwendet — er beschreibt welchen Stand
      # der Upstream-Dokumentation das Image enthält.
      # URL und SHA werden zusätzlich als OCI-Labels gesetzt.
      - name: Get upstream repo SHA
        id: upstream
        run: |
          DOCKERFILE="${{ matrix.image }}/Dockerfile"
          UPSTREAM_URL=$(grep -m1 'git clone' "$DOCKERFILE" \
            | awk '{print $3}' | tr -d "\"'" || true)

          if [ -n "$UPSTREAM_URL" ]; then
            echo "url=$UPSTREAM_URL" >> $GITHUB_OUTPUT
            SHA=$(git ls-remote "$UPSTREAM_URL" HEAD 2>/dev/null | cut -c1-7 || echo "")
            if [ -n "$SHA" ]; then
              echo "sha=$SHA" >> $GITHUB_OUTPUT
              echo "Upstream: $UPSTREAM_URL @ $SHA"
            else
              echo "sha=latest" >> $GITHUB_OUTPUT
              echo "::warning::Could not resolve SHA for $UPSTREAM_URL — falling back to 'latest'"
            fi
          else
            echo "url=" >> $GITHUB_OUTPUT
            echo "sha=latest" >> $GITHUB_OUTPUT
            echo "::warning::No git clone found in $DOCKERFILE — falling back to 'latest'"
          fi

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.sanitize.outputs.safe_name }}-docs
          # Automatisch gesetzt von metadata-action:
          #   org.opencontainers.image.created, .revision, .source, .url, .version
          # Statische Labels (title, description, documentation, vendor, licenses)
          #   stehen im jeweiligen Dockerfile als LABEL-Instruktion.
          labels: |
            io.tuxpeople.upstream.url=${{ steps.upstream.outputs.url }}
            io.tuxpeople.upstream.sha=${{ steps.upstream.outputs.sha }}
          tags: |
            # Primärer Tag: upstream Docs-Repo HEAD SHA (z.B. "a3f9c12")
            type=raw,value=${{ steps.upstream.outputs.sha }},enable=${{ github.event_name != 'pull_request' }}
            # latest zeigt immer auf den letzten main-Build
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}
            # PR-Builds bekommen einen pr-N Tag (kein Push, nur für Cache)
            type=ref,event=pr

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./${{ matrix.image }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ steps.sanitize.outputs.safe_name }}
          cache-to: type=gha,mode=max,scope=${{ steps.sanitize.outputs.safe_name }}
          # SBOM via BuildKit: wird als OCI-Attestation am Image-Manifest angehängt
          # Generiert während dem Build (Syft), kein nachträgliches Scannen
          sbom: ${{ github.event_name != 'pull_request' }}
          # Inline SLSA Provenance (Build Level 1) — Level 3 folgt im provenance-Job
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || 'false' }}

      # Digest für den SLSA-Job speichern
      - name: Save digest for SLSA
        if: github.event_name != 'pull_request'
        run: |
          image_ref="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.sanitize.outputs.safe_name }}-docs"
          digest="${{ steps.build.outputs.digest }}"
          printf '%s  %s\n' "${digest#sha256:}" "${image_ref}" > digest.txt
          echo "Saved: $(cat digest.txt)"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: digest-${{ steps.sanitize.outputs.safe_name }}
          path: digest.txt
          if-no-files-found: error

      # Upstream SHA für den update-chart-Job speichern
      - name: Save upstream SHA for chart update
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.sanitize.outputs.safe_name }}=${{ steps.upstream.outputs.sha }}" \
            > upstream-sha.txt

      - name: Upload upstream SHA artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: upstream-sha-${{ steps.sanitize.outputs.safe_name }}
          path: upstream-sha.txt
          if-no-files-found: error

      # ---------------------------------------------------------------
      # Stable version build (nur bei Repos mit versions.json)
      #
      # Versionierte Docs-Repos (z.B. Harvester, Rancher) haben eine
      # versions.json mit stabilen Releases. Für die neueste stabile
      # Version wird ein separates Image gebaut und mit dem Versions-Tag
      # gepusht (z.B. :v1.7, :2.12).
      #
      # Idempotent: existiert das Image bereits, wird es übersprungen.
      # Stabile Docs ändern sich nicht mehr → einmal gebaut, nie wieder.
      #
      # continue-on-error: Build-Fehler (z.B. fehlende API-Docs in alten
      # Versionen) blockieren nicht den Rest der Pipeline.
      # ---------------------------------------------------------------
      - name: Detect upstream stable version
        id: stable
        if: github.event_name != 'pull_request'
        run: |
          UPSTREAM_URL="${{ steps.upstream.outputs.url }}"
          if [ -z "$UPSTREAM_URL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Minimaler Clone: nur versions.json holen ohne vollständigen Checkout
          # --filter=blob:none: lädt keine Datei-Inhalte beim Clone
          # git checkout HEAD -- versions.json: holt nur diese eine Datei
          TMPDIR=$(mktemp -d)
          git clone --depth=1 --filter=blob:none --no-checkout --quiet \
            "$UPSTREAM_URL" "$TMPDIR" 2>/dev/null \
          && git -C "$TMPDIR" checkout HEAD -- versions.json 2>/dev/null \
          || { echo "skip=true" >> $GITHUB_OUTPUT; rm -rf "$TMPDIR"; exit 0; }

          if [ ! -f "$TMPDIR/versions.json" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            rm -rf "$TMPDIR"
            exit 0
          fi

          # Neueste stabile Version = erstes Element in versions.json
          LATEST=$(node -e "
            try {
              const v = JSON.parse(require('fs').readFileSync('$TMPDIR/versions.json', 'utf8'));
              if (Array.isArray(v) && v.length > 0) console.log(v[0]);
            } catch(e) {}
          " 2>/dev/null || echo "")
          rm -rf "$TMPDIR"

          if [ -z "$LATEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Neueste stabile Version: $LATEST"

      - name: Check if stable version image already exists in GHCR
        id: stable-check
        if: steps.stable.outputs.skip == 'false'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.sanitize.outputs.safe_name }}-docs"
          VERSION="${{ steps.stable.outputs.version }}"
          if docker manifest inspect "${IMAGE}:${VERSION}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "${IMAGE}:${VERSION} existiert bereits — Build wird übersprungen"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "${IMAGE}:${VERSION} nicht gefunden — wird gebaut"
          fi

      - name: Build and push stable version image
        if: steps.stable.outputs.skip == 'false' && steps.stable-check.outputs.exists == 'false'
        continue-on-error: true
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./${{ matrix.image }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.sanitize.outputs.safe_name }}-docs:${{ steps.stable.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.stable.outputs.version }}
          cache-from: type=gha,scope=${{ steps.sanitize.outputs.safe_name }}
          sbom: true
          provenance: mode=max

  # ---------------------------------------------------------------
  # Collect: Digests aus allen Matrix-Jobs zusammenführen
  # ---------------------------------------------------------------
  collect-digests:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.combine.outputs.hashes }}
    steps:
      - name: Download all digest artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: digest-*
          path: digests

      - name: Combine and base64-encode digests
        id: combine
        run: |
          echo "All digests:"
          cat digests/*/digest.txt
          hashes=$(cat digests/*/digest.txt | base64 -w0)
          echo "hashes=$hashes" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------
  # Provenance: SLSA Level 3 für alle Images
  # ---------------------------------------------------------------
  provenance:
    needs: collect-digests
    if: github.event_name != 'pull_request'
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{ needs.collect-digests.outputs.hashes }}"
      upload-assets: ${{ github.event_name == 'release' }}

  # ---------------------------------------------------------------
  # Update Chart: values.yaml + Chart.yaml aktualisieren und
  # Helm Chart als OCI nach GHCR pushen.
  #
  # Läuft nur auf main-Pushes (nicht bei PRs oder Releases).
  # Image-Tags in values.yaml werden auf die upstream SHAs gesetzt.
  # Chart-Version wird als CalVer (YYYY.M.D) gesetzt.
  # ---------------------------------------------------------------
  update-chart:
    needs: [collect-digests]
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit + push zurück zu main
      packages: write   # Helm Chart nach GHCR OCI pushen

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download upstream SHA artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: upstream-sha-*
          path: upstream-shas

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update image tags in values.yaml
        run: |
          # Mapping: safe_name (Verzeichnis) → values.yaml-Schlüssel
          declare -A KEY_MAP=(
            ["rancher"]="rancher"
            ["rke2"]="rke2"
            ["k3s"]="k3s"
            ["longhorn"]="longhorn"
            ["fleet"]="fleet"
            ["kubewarden"]="kubewarden"
            ["harvester"]="harvester"
            ["rancher-desktop"]="rancherdesktop"
          )

          for f in upstream-shas/upstream-sha-*/upstream-sha.txt; do
            line=$(cat "$f")
            safe_name="${line%%=*}"
            sha="${line##*=}"
            values_key="${KEY_MAP[$safe_name]:-}"

            if [ -n "$values_key" ] && [ -n "$sha" ] && [ "$sha" != "latest" ]; then
              echo "  docs.${values_key}.tag = ${sha}"
              yq -i ".docs.${values_key}.tag = \"${sha}\"" \
                charts/rancher-offline-docs/values.yaml
            else
              echo "  Skipping $safe_name (kein Mapping oder SHA nicht verfügbar)"
            fi
          done

          echo ""
          echo "Aktualisierte Tags:"
          yq '.docs | to_entries | .[] | .key + ": " + .value.tag' \
            charts/rancher-offline-docs/values.yaml

      - name: Set CalVer chart version
        id: calver
        run: |
          VERSION=$(date +%Y.%-m.%-d)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          yq -i ".version = \"${VERSION}\"" charts/rancher-offline-docs/Chart.yaml
          echo "Chart-Version: $VERSION"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm chart to GHCR OCI
        run: |
          helm package charts/rancher-offline-docs --destination .helm-output
          helm push .helm-output/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          echo ""
          echo "Chart verfügbar unter:"
          echo "  oci://ghcr.io/${{ github.repository_owner }}/charts/rancher-offline-docs:${{ steps.calver.outputs.version }}"
          echo ""
          echo "Installieren mit:"
          echo "  helm install rancher-offline-docs \\"
          echo "    oci://ghcr.io/${{ github.repository_owner }}/charts/rancher-offline-docs \\"
          echo "    --version ${{ steps.calver.outputs.version }}"

      - name: Commit updated values.yaml and Chart.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/rancher-offline-docs/values.yaml \
                  charts/rancher-offline-docs/Chart.yaml
          if git diff --staged --quiet; then
            echo "Keine Änderungen — nichts zu committen"
            exit 0
          fi
          git commit -m "chore: update image tags + chart ${{ steps.calver.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push origin main
