apiVersion: v2
name: rancher-offline-docs
description: >
  Deploys offline documentation for the Rancher product portfolio.
  Each product doc runs as a separate container (chainguard/nginx on port 8080).
  Images are built from public upstream repos and pushed to GHCR.
