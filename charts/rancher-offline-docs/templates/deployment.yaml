{{- if .Values.docs.rancher.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rancher-offline-docs
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rancher-offline-docs.labels" . | nindent 4 }}
    app: rancher-offline-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rancher-offline-docs
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: rancher-offline-docs
    spec:
      containers:
        - name: rancher-offline-docs
          image: {{ include "rancher-offline-docs.image" (list . "rancher") }}
          ports:
            - name: http
              containerPort: 8080
{{- end }}

