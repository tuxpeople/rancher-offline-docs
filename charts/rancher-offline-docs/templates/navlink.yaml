{{- if .Values.docs.rancher.enabled }}
---
apiVersion: ui.cattle.io/v1
kind: NavLink
metadata:
  name: rancher-offline-docs
spec:
  label: Rancher Docs
  description: Rancher Multi-cluster Manager
  group: Offline Docs
  sideLabel: Multi-cloud
  target: _blank
  iconSrc: data:image/svg+xml;base64,
  toService:
    name: rancher-offline-docs
    namespace: {{ .Values.namespace }}
    port: "80"
    scheme: http
{{- end }}

