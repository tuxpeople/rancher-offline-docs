# Default values for rancher-offline-docs
# Images are built by CI and pushed to GHCR as:
#   ghcr.io/<owner>/<n>-docs:<tag>
#
# Tags combine the upstream docs HEAD SHA and this repository's build commit
# so packaging fixes trigger a Kubernetes rollout.
#
# chainguard/nginx listens on port 8080 (non-root)

namespace: rancher-docs-system
registry: ghcr.io/tuxpeople
# Per-product config
# tag: set automatically by CI (e.g. "a3f9c12-7ffb591")
# enabled: set to false to skip a product (useful in low-compute environments)
docs:
  rancher:
    enabled: true
    image: rancher-docs
    tag: 5e84867-adb5c81
  rke2:
    enabled: true
    image: rke2-docs
    tag: 099c7c3-adb5c81
  k3s:
    enabled: true
    image: k3s-docs
    tag: ee59dfa-adb5c81
  longhorn:
    enabled: true
    image: longhorn-docs
    tag: 4d50d95-adb5c81
  fleet:
    enabled: true
    image: fleet-docs
    tag: 1b43329-adb5c81
  kubewarden:
    enabled: true
    image: kubewarden-docs
    tag: 43393b7-adb5c81
  harvester:
    enabled: true
    image: harvester-docs
    tag: e27cb74-adb5c81
  rancherdesktop:
    enabled: true
    image: rancher-desktop-docs
    tag: dc3d52f-adb5c81
