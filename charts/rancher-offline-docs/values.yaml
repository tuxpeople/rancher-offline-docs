# Default values for rancher-offline-docs
# Images are built by CI and pushed to GHCR as:
#   ghcr.io/<owner>/<n>-docs:<tag>
#
# Tags correspond to the HEAD commit SHA of the upstream docs repo
# at build time — automatically updated by CI after each build.
#
# chainguard/nginx listens on port 8080 (non-root)

namespace: rancher-docs-system
registry: ghcr.io/tuxpeople
# Per-product config
# tag: set automatically by CI to the upstream repo HEAD SHA (e.g. "a3f9c12")
# enabled: set to false to skip a product (useful in low-compute environments)
docs:
  rancher:
    enabled: true
    image: rancher-docs
    tag: 5e84867
  rke2:
    enabled: true
    image: rke2-docs
    tag: a2e3f01
  k3s:
    enabled: true
    image: k3s-docs
    tag: ee59dfa
  longhorn:
    enabled: true
    image: longhorn-docs
    tag: 4d50d95
  fleet:
    enabled: true
    image: fleet-docs
    tag: 1b43329
  kubewarden:
    enabled: true
    image: kubewarden-docs
    tag: 7bc0303
  harvester:
    enabled: true
    image: harvester-docs
    tag: 772b1eb
  rancherdesktop:
    enabled: true
    image: rancher-desktop-docs
    tag: 733300f
